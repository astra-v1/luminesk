name: CI + Release + Publish

on:
  push:
    tags: ["v*"]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5
      - name: Install deps
        run: uv sync --locked --extra dev
      - name: Run tests
        run: uv run pytest

  build:
    name: Build (${{ matrix.os }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5
      - name: Install deps
        run: uv sync --locked --extra dev --extra build
      - name: Build + Test binary
        shell: bash
        run: |
          case "$RUNNER_OS" in
            Linux)   OS_NAME="linux" ;;
            macOS)   OS_NAME="darwin" ;;
            Windows) OS_NAME="windows" ;;
          esac
          ARCH=$(uname -m)
          [[ "$ARCH" == "x86_64" ]] && ARCH="amd64"
          [[ "$ARCH" == "aarch64" ]] && ARCH="arm64"

          NAME="luminesk-$OS_NAME-$ARCH"
          [[ "$RUNNER_OS" == "Windows" ]] && NAME="$NAME.exe"

          echo "BINARY_NAME=$NAME" >> "$GITHUB_ENV"
          uv run python -m nuitka \
            --onefile \
            --assume-yes-for-downloads \
            --output-dir=dist \
            --output-filename="$NAME" \
            --include-package-data=luminesk.gui \
            --include-package-data=luminesk.tui \
            luminesk/__main__.py

          BIN="dist/$NAME"
          chmod +x "$BIN" || true
          ./"$BIN" --help
          ./"$BIN" --version
          ./"$BIN" doctor
          ./"$BIN" create -n "CI-Test" -d "./test-server" -c "pnx" -t "test"
          ./"$BIN" cores

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: binaries-${{ matrix.os }}
          path: dist/${{ env.BINARY_NAME }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: all_binaries
          pattern: binaries-*
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: all_binaries/*
          generate_release_notes: true

  publish-pypi:
    name: Publish to PyPI
    needs: release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install uv
        uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5
      - name: Build Package
        run: uv build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
